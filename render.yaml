databases:
  - name: hakios-db
    databaseName: hakios
    user: hakios
    region: frankfurt
    plan: free

services:
  - type: web
    name: hakios-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npm run build -- --filter=@hakios/api
    startCommand: node apps/api/dist/migrate.js && node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hakios-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set to https://hakios-web.onrender.com after first deploy (controls CORS)
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  - type: web
    name: hakios-web
    runtime: static
    buildCommand: npm ci --include=dev && npm run build -- --filter=@hakios/web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to https://hakios-api.onrender.com after first deploy
      - key: VITE_API_URL
        sync: false
